name: CI

# Runs on PRs only. Pushes to main are validated by the release workflow
# (.github/workflows/publish.yml), which runs the same checks before publishing.
on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

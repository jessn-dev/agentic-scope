name: Publish

# Publishes to npm when you push a version tag, e.g. `git tag v0.1.1 && git push --tags`.
# Uses npm provenance (the verified badge). Requires an NPM_TOKEN secret with
# "bypass 2FA" enabled (granular access token).

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Release

# Auto-publishes to npm on every push to main. semantic-release reads the
# Conventional Commits since the last release and decides the version bump:
#   fix:            -> patch   (e.g. 0.2.0 -> 0.2.1)
#   feat:           -> minor   (e.g. 0.2.0 -> 0.3.0)
#   feat!: / BREAKING CHANGE in body -> major (e.g. 0.2.0 -> 1.0.0)
# It then updates package.json + CHANGELOG.md, tags, creates a GitHub release,
# and publishes with npm provenance. No version bump = no release.
#
# Requires repo secret NPM_TOKEN (granular automation token, "bypass 2FA").
# GITHUB_TOKEN is provided automatically by Actions.

on:
  push:
    branches: [main]

# Prevent overlapping releases if pushes land close together.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production # NPM_TOKEN is stored as a Production environment secret
    permissions:
      contents: write # create tags, commits, and GitHub releases
      issues: write # semantic-release comments on released issues/PRs
      pull-requests: write
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

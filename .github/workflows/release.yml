name: Release

# Auto-publishes to npm on every push to main. semantic-release reads the
# Conventional Commits since the last release and decides the version bump:
#   fix:            -> patch   (e.g. 0.2.0 -> 0.2.1)
#   feat:           -> minor   (e.g. 0.2.0 -> 0.3.0)
#   feat!: / BREAKING CHANGE in body -> major (e.g. 0.2.0 -> 1.0.0)
# It then updates package.json + CHANGELOG.md, tags, creates a GitHub release,
# and publishes via npm OIDC Trusted Publishing (no token). No bump = no release.
#
# npm auth comes from GitHub OIDC (id-token: write). Configure the matching
# Trusted Publisher on npmjs.com for package "agenticscope":
#   Repository owner: jessn-dev
#   Repository:       agentic-scope
#   Workflow filename: release.yml   <-- this file's basename, exactly
#   Environment:       (leave blank) <-- this job runs outside any environment

on:
  push:
    branches: [main]

# Prevent overlapping releases if pushes land close together.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags, commits, and GitHub releases
      issues: write # semantic-release comments on released issues/PRs
      pull-requests: write
      id-token: write # required for npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: true
      # NOTE: no `registry-url` here. setup-node's registry-url writes an
      # ~/.npmrc with `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` and
      # `always-auth=true`. With no token that empty auth header is sent on the
      # publish and npm never falls back to OIDC, so trusted publishing fails
      # with a misleading 404. Leaving it out lets npm do the OIDC exchange.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Trusted publishing (OIDC) needs npm >= 11.5.1; runners ship npm 10.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

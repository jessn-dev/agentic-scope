name: Release

# Auto-publishes to npm on every push to main. semantic-release reads the
# Conventional Commits since the last release and decides the version bump:
#   fix:            -> patch   (e.g. 0.2.0 -> 0.2.1)
#   feat:           -> minor   (e.g. 0.2.0 -> 0.3.0)
#   feat!: / BREAKING CHANGE in body -> major (e.g. 0.2.0 -> 1.0.0)
# It then updates package.json + CHANGELOG.md, tags, creates a GitHub release,
# and publishes via npm OIDC Trusted Publishing (no token). No bump = no release.
#
# npm auth comes from GitHub OIDC (id-token: write). Configure the matching
# Trusted Publisher on npmjs.com for package "agenticscope":
#   Repository owner: jessn-dev
#   Repository:       agentic-scope
#   Workflow filename: release.yml   <-- this file's basename, exactly
#   Environment:       (leave blank) <-- this job runs outside any environment

on:
  push:
    branches: [main]

# Prevent overlapping releases if pushes land close together.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags, commits, and GitHub releases
      issues: write # semantic-release comments on released issues/PRs
      pull-requests: write
      id-token: write # required for npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: true
      # Trusted publishing (OIDC) needs npm >= 11.5.1 and Node >= 22.14.0.
      # Node 24 ships npm 11.x natively, so no manual npm upgrade is required
      # (upgrading the runner's bundled npm via `npm i -g` did not reliably take
      # effect on PATH for the publish subprocess). registry-url is required so
      # npm knows which registry to run the OIDC exchange against; no token is
      # set — auth comes entirely from the GitHub OIDC id-token.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: node --version && npm --version # must be node >= 22.14 and npm >= 11.5.1
      # setup-node's registry-url writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
      # plus `always-auth=true`. With no token, NODE_AUTH_TOKEN is a literal
      # placeholder, so npm sends a bogus credential and skips OIDC (404). Strip
      # both lines so npm 11 has the registry but no token, and uses the GitHub
      # OIDC id-token for trusted publishing.
      - name: Enable OIDC trusted publishing (strip token auth from npmrc)
        run: |
          sed -i '/_authToken/d; /always-auth/d' "$NPM_CONFIG_USERCONFIG"
          echo "npmrc now:"; cat "$NPM_CONFIG_USERCONFIG"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # semantic-release bumps package.json + CHANGELOG, tags, and creates the
      # GitHub release, but does NOT publish to npm (npmPublish: false). Its npm
      # plugin runs npm in a child env with its own npmrc that shadows the OIDC
      # config, so trusted publishing only works as a top-level step.
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Publish at the top level, where the stripped npmrc + OIDC id-token work.
      # Re-strip in case semantic-release rewrote the npmrc. Publishes only when
      # the version in package.json (just bumped by semantic-release on a release)
      # isn't already on npm — so non-release pushes are a no-op.
      - name: Publish to npm via OIDC trusted publishing
        run: |
          sed -i '/_authToken/d; /always-auth/d' "$NPM_CONFIG_USERCONFIG" 2>/dev/null || true
          VERSION=$(node -p "require('./package.json').version")
          if npm view "agenticscope@$VERSION" version >/dev/null 2>&1; then
            echo "agenticscope@$VERSION already on npm — nothing to publish"
          else
            echo "publishing agenticscope@$VERSION"
            npm publish --provenance --access public
          fi

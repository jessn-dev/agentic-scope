[scope]
version    = "0.1.0"
name       = "sample-api"
budget     = 3000
precedence = "type"   # "type" (rules first) or "priority"

[[fragment]]
id       = "coding-rules"
type     = "rule"
path     = ".scope/rules/coding.md"
triggers = ["**/*.ts", "**/*.js"]   # globs -> file paths
keywords = ["refactor", "lint"]     # words -> task text
priority = 100

[[fragment]]
id       = "db-schema"
type     = "knowledge"
path     = ".scope/knowledge/schema.sql"
triggers = ["**/*.sql", "db/**"]
keywords = ["migration", "schema", "sql", "database"]
priority = 20

[[fragment]]
id       = "auth-spec"
type     = "spec"
path     = ".scope/specs/auth.md"
keywords = ["auth", "login", "token", "session"]
priority = 80

[[fragment]]
id       = "qa-persona"
type     = "persona"
path     = ".scope/personas/qa.md"
keywords = ["test", "qa", "review"]
priority = 50
